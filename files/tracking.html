<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC TRACKING SYSTEM</title>

<style>
body{
  background:#050505;
  color:#e6e6e6;
  font-family:Courier New, monospace;
  margin:0;
}

h1{
  color:#ff2a2a;
  padding:10px;
}

/* FIXED MAP */
#map{
  position:relative;
  width:100%;
  height:90vh;
  background:url("https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/1920px-World_map_-_low_resolution.svg.png");
  background-size:cover;
  background-position:center;
}

/* dots */
.dot{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
}

.red{ background:red; }
.blue{ background:cyan; }

.label{
  position:absolute;
  font-size:10px;
  transform:translate(12px,-5px);
}

/* alert */
#alert{
  position:fixed;
  bottom:10px;
  left:10px;
  background:#1a0000;
  border:1px solid red;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<h1>GLOBAL ANOMALY TRACKING</h1>
<div id="map"></div>
<div id="alert"></div>

<script>
const map = document.getElementById("map");
const alertBox = document.getElementById("alert");

let anomalies = JSON.parse(localStorage.getItem("anomalies")) || [
  {name:"ANOMALY-001", x:50, y:50, type:"red"},
  {name:"ALPHA-91", x:60, y:40, type:"blue", count:5}
];

/* render */
function render(){
  map.innerHTML = "";

  anomalies.forEach(a=>{
    let dot = document.createElement("div");
    dot.className = "dot " + a.type;
    dot.style.left = a.x + "%";
    dot.style.top = a.y + "%";

    let label = document.createElement("div");
    label.className = "label";
    label.innerText = a.name + (a.count ? " ("+a.count+")" : "");

    dot.appendChild(label);
    map.appendChild(dot);
  });
}

/* combat system */
function simulate(){
  let anomaly = anomalies.find(a=>a.type==="red");
  let alpha = anomalies.find(a=>a.type==="blue");

  if(anomaly && alpha){
    let dx = anomaly.x - alpha.x;
    let dy = anomaly.y - alpha.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 5 && alpha.count > 0){
      let loss = Math.floor(Math.random()*2); // 0 or 1 dies
      alpha.count -= loss;

      if(loss > 0){
        showAlert("⚠ ALPHA-91 LOST UNIT");
      }

      if(alpha.count <= 0){
        showAlert("☠ ALL ALPHA-91 UNITS LOST");
        alpha.count = 0;
      }
    }
  }

  localStorage.setItem("anomalies", JSON.stringify(anomalies));
  render();
}

/* alert */
function showAlert(msg){
  alertBox.style.display = "block";
  alertBox.innerText = msg;
  setTimeout(()=>alertBox.style.display="none",3000);
}

/* listen updates */
window.addEventListener("storage", ()=>{
  anomalies = JSON.parse(localStorage.getItem("anomalies")) || anomalies;
  let msg = localStorage.getItem("message");

  render();

  if(msg){
    showAlert(msg);
    localStorage.removeItem("message");
  }
});

/* loop */
setInterval(simulate, 2000);

render();
</script>

</body>
</html>
