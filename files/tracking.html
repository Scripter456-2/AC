<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC TRACKING SYSTEM</title>

<style>
body{
  background:#050505;
  color:#e6e6e6;
  font-family:Courier New, monospace;
  margin:20px;
}

h1{ color:#ff2a2a; }

.container{
  max-width:1000px;
  margin:auto;
  background:#111;
  padding:20px;
  border:2px solid #333;
}

/* bases */
.base{
  background:#0f0f0f;
  border:1px solid #444;
  padding:10px;
  margin:10px 0;
}

/* log */
#log{
  margin-top:20px;
  background:#000;
  border:1px solid #333;
  padding:10px;
  height:300px;
  overflow-y:auto;
  font-size:13px;
}

.entry{
  margin-bottom:5px;
}

.red{ color:#ff2a2a; }
.blue{ color:#00ffff; }
.yellow{ color:#ffcc00; }

</style>
</head>

<body>

<div class="container">

<h1>GLOBAL CONTROL FEED</h1>

<h2>BASES</h2>
<div id="bases"></div>

<h2>ANNOUNCEMENTS</h2>
<div id="log"></div>

</div>

<script>
let bases = JSON.parse(localStorage.getItem("bases")) || [
  {name:"SITE-01", status:"STABLE"},
  {name:"SITE-02", status:"STABLE"}
];

let log = JSON.parse(localStorage.getItem("log")) || [];

/* render bases */
function renderBases(){
  let el = document.getElementById("bases");
  el.innerHTML = "";

  bases.forEach(b=>{
    let div = document.createElement("div");
    div.className = "base";
    div.innerHTML = `<b>${b.name}</b><br>Status: ${b.status}`;
    el.appendChild(div);
  });
}

/* render log */
function renderLog(){
  let el = document.getElementById("log");
  el.innerHTML = "";

  log.slice(-50).forEach(entry=>{
    let div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = entry;
    el.appendChild(div);
  });

  el.scrollTop = el.scrollHeight;
}

/* listen updates */
window.addEventListener("storage", ()=>{
  bases = JSON.parse(localStorage.getItem("bases")) || bases;
  log = JSON.parse(localStorage.getItem("log")) || log;

  renderBases();
  renderLog();
});

renderBases();
renderLog();
</script>

</body>
</html>
