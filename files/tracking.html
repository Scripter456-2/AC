<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC TRACKING SYSTEM</title>

<style>
body{
  background:#050505;
  color:#e6e6e6;
  font-family:Courier New, monospace;
  margin:20px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:#111;
  padding:20px;
  border:2px solid #333;
}

h1{ color:#ff2a2a; }

/* sites */
.site{
  background:#0f0f0f;
  border:1px solid #444;
  padding:10px;
  margin:10px 0;
}

/* status colors */
.stable{ color:#00ff88; }
.attack{ color:#ffaa00; }
.breached{ color:#ff4444; }
.unstable{ color:#ff00ff; }

/* logs */
#log, #terminalLog{
  background:#000;
  border:1px solid #333;
  padding:10px;
  height:180px;
  overflow-y:auto;
  font-size:13px;
  margin-bottom:15px;
}

/* emergency */
#emergency{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:40px;
  z-index:9999;
  animation: flash 0.5s infinite;
}

@keyframes flash{
  0%{background:#000;color:red;}
  50%{background:red;color:black;}
  100%{background:#000;color:red;}
}
</style>
</head>

<body>

<div class="container">

<h1>GLOBAL CONTROL FEED</h1>

<h2>SITES</h2>
<div id="sites"></div>

<h2>ANNOUNCEMENTS</h2>
<div id="log"></div>

<h2>TERMINAL (READ ONLY)</h2>
<div id="terminalLog"></div>

</div>

<div id="emergency"></div>

<audio id="alarm" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="raid" src="https://www.soundjay.com/button/sounds/beep-10.mp3"></audio>

<script>
let log = JSON.parse(localStorage.getItem("log")) || [];
let terminal = JSON.parse(localStorage.getItem("terminal")) || [];
let bases = JSON.parse(localStorage.getItem("bases")) || [
  {name:"SITE-01", status:"STABLE"},
  {name:"SITE-02", status:"STABLE"}
];

const logEl = document.getElementById("log");
const termEl = document.getElementById("terminalLog");
const sitesEl = document.getElementById("sites");
const emergency = document.getElementById("emergency");

/* render */
function render(){

  /* sites */
  sitesEl.innerHTML="";
  bases.forEach(b=>{
    let div = document.createElement("div");
    div.className="site";

    let statusClass = "stable";
    if(b.status==="UNDER ATTACK") statusClass="attack";
    if(b.status==="BREACHED") statusClass="breached";
    if(b.status==="UNSTABLE") statusClass="unstable";

    div.innerHTML = `
      <b>${b.name}</b><br>
      Status: <span class="${statusClass}">${b.status}</span>
    `;

    sitesEl.appendChild(div);
  });

  /* logs */
  logEl.innerHTML="";
  log.slice(-50).forEach(e=>{
    let d=document.createElement("div");
    d.innerText=e;
    logEl.appendChild(d);
  });

  /* terminal */
  termEl.innerHTML="";
  terminal.slice(-50).forEach(e=>{
    let d=document.createElement("div");
    d.innerText=e;
    termEl.appendChild(d);
  });
}

/* sync */
window.addEventListener("storage", ()=>{
  log = JSON.parse(localStorage.getItem("log")) || log;
  terminal = JSON.parse(localStorage.getItem("terminal")) || terminal;
  bases = JSON.parse(localStorage.getItem("bases")) || bases;

  render();

  let em = localStorage.getItem("emergency");
  if(em){
    let data = JSON.parse(em);
    emergency.style.display="flex";
    emergency.innerHTML=`⚠ ${data.level} ⚠<br>${data.message}`;
    document.getElementById("alarm").play();

    setTimeout(()=>{
      emergency.style.display="none";
      localStorage.removeItem("emergency");
    },6000);
  }
});

/* random failures */
setInterval(()=>{
  if(Math.random()<0.2){
    let log = JSON.parse(localStorage.getItem("log")) || [];
    log.push("⚠ SYSTEM FAILURE DETECTED – SEND TECH TEAM");
    localStorage.setItem("log", JSON.stringify(log));
  }
},6000);

/* RAID */
setInterval(()=>{
  if(Math.random()<0.1){
    let log = JSON.parse(localStorage.getItem("log")) || [];
    log.push("🚨 RAID WARNING – HOSTILES DETECTED");
    localStorage.setItem("log", JSON.stringify(log));

    emergency.style.display="flex";
    emergency.innerHTML="🚨 RAID WARNING 🚨<br>DEFEND ALL SITES";
    document.getElementById("raid").play();

    setTimeout(()=>emergency.style.display="none",5000);
  }
},12000);

render();
</script>

</body>
</html>
