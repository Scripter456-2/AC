<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC CONTROL PANEL</title>

<style>
body{
  background:#050505;
  color:#e6e6e6;
  font-family:Courier New, monospace;
  margin:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#111;
  padding:20px;
  border:2px solid #333;
}

h1{ color:#ff2a2a; }

input, select, button{
  margin:5px;
  padding:5px;
  background:#000;
  color:#fff;
  border:1px solid #444;
}

button{ cursor:pointer; }

</style>
</head>

<body>

<div class="container">

<h1>CONTROL PANEL</h1>

<h2>Create Base</h2>
<input id="baseName" placeholder="SITE-03">
<button onclick="addBase()">Create</button>

<h2>Set Base Status</h2>
<input id="baseTarget" placeholder="SITE-01">
<select id="status">
  <option>STABLE</option>
  <option>UNDER ATTACK</option>
  <option>BREACHED</option>
  <option>UNSTABLE</option>
</select>
<button onclick="updateBase()">Update</button>

<h2>Containment Breach</h2>
<select id="breachLevel">
  <option>Minimal Danger</option>
  <option>Mid Danger</option>
  <option>Moderate Danger</option>
  <option>Severe Danger</option>
  <option>Complete Destruction</option>
</select>
<button onclick="breach()">Trigger</button>

<h2>Reactor Control</h2>
<input id="reactorSite" placeholder="SITE-01">
<button onclick="reactorStart()">Start Instability</button>
<button onclick="reactorExplode()">FORCE MELTDOWN</button>

<h2>Deploy Units</h2>
<select id="deployType">
  <option>Alpha-91</option>
  <option>Reactor Team</option>
  <option>Containment Unit</option>
</select>
<input id="deploySite" placeholder="SITE-01">
<button onclick="deploy()">Send</button>

<h2>Custom Message</h2>
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>

</div>

<script>
function getLog(){
  return JSON.parse(localStorage.getItem("log")) || [];
}

function saveLog(log){
  localStorage.setItem("log", JSON.stringify(log));
}

function getBases(){
  return JSON.parse(localStorage.getItem("bases")) || [];
}

function saveBases(bases){
  localStorage.setItem("bases", JSON.stringify(bases));
}

/* BASES */
function addBase(){
  let name = document.getElementById("baseName").value;

  let bases = getBases();
  bases.push({name, status:"STABLE"});

  saveBases(bases);

  let log = getLog();
  log.push("🟢 Base created: " + name);
  saveLog(log);
}

function updateBase(){
  let name = document.getElementById("baseTarget").value;
  let status = document.getElementById("status").value;

  let bases = getBases();

  bases.forEach(b=>{
    if(b.name === name){
      b.status = status;
    }
  });

  saveBases(bases);

  let log = getLog();
  log.push("🟡 " + name + " status updated to " + status);
  saveLog(log);
}

/* BREACH */
function breach(){
  let level = document.getElementById("breachLevel").value;

  let log = getLog();
  log.push("🔴 CONTAINMENT BREACH: " + level);

  // automatic escalation message
  if(level === "Severe Danger" || level === "Complete Destruction"){
    log.push("⚠ EMERGENCY PROTOCOLS ACTIVATED");
  }

  saveLog(log);
}

/* REACTOR SYSTEM */
function reactorStart(){
  let site = document.getElementById("reactorSite").value;

  let log = getLog();
  log.push("☢ Reactor instability detected at " + site);
  log.push("⚠ Reactor core temperature rising");

  saveLog(log);

  // delayed escalation
  setTimeout(()=>{
    let log = getLog();
    log.push("⚠ Reactor critical state at " + site);
    saveLog(log);
  }, 4000);
}

/* FULL MELTDOWN */
function reactorExplode(){
  let site = document.getElementById("reactorSite").value;

  let bases = getBases();

  bases.forEach(b=>{
    if(b.name === site){
      b.status = "UNSTABLE";
    }
  });

  saveBases(bases);

  let log = getLog();
  log.push("☢☢☢ REACTOR MELTDOWN at " + site);
  log.push("💥 BASE STATUS SET TO UNSTABLE");
  log.push("⚠ EVACUATION FAILURE");
  log.push("☠ MULTIPLE LOSSES DETECTED");

  saveLog(log);
}

/* DEPLOY */
function deploy(){
  let type = document.getElementById("deployType").value;
  let site = document.getElementById("deploySite").value;

  let log = getLog();

  log.push("🚁 " + type + " deployed to " + site);

  if(type === "Alpha-91"){
    if(Math.random() < 0.5){
      log.push("☠ Alpha-91 units lost during operation");
    } else {
      log.push("🔵 Alpha-91 stabilizing anomaly at " + site);
    }
  }

  if(type === "Reactor Team"){
    log.push("☢ Reactor stabilization attempt at " + site);

    // chance to fix
    if(Math.random() < 0.4){
      let bases = getBases();
      bases.forEach(b=>{
        if(b.name === site){
          b.status = "STABLE";
        }
      });
      saveBases(bases);

      log.push("✅ Reactor stabilized successfully");
    } else {
      log.push("⚠ Reactor stabilization FAILED");
    }
  }

  saveLog(log);
}

/* CUSTOM MESSAGE */
function sendMsg(){
  let msg = document.getElementById("msg").value;

  let log = getLog();
  log.push("📢 " + msg);

  saveLog(log);
}
</script>

</body>
</html>
