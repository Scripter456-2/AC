<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC CONTROL PANEL</title>

<style>
body{
  background:#050505;
  color:#e6e6e6;
  font-family:Courier New, monospace;
  margin:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#111;
  padding:30px;
  border:2px solid #333;
}

h1{ color:#ff2a2a; }

#map{
  width:100%;
  height:300px;
  background:url("https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/1920px-World_map_-_low_resolution.svg.png");
  background-size:cover;
  margin-bottom:20px;
  cursor:pointer;
  position:relative;
}

.marker{
  position:absolute;
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
}

button, input{
  margin:5px;
  padding:5px;
  background:#000;
  color:#fff;
  border:1px solid #444;
}
</style>
</head>

<body>

<div class="container">

<h1>CONTROL PANEL</h1>

<h2>Select Location</h2>
<div id="map"></div>
<p>X: <span id="x">0</span> | Y: <span id="y">0</span></p>

<h2>Deploy Alpha Units</h2>
<input id="count" placeholder="Unit count">
<button onclick="deploy()">Send Alpha-91</button>

<h2>Move Anomaly</h2>
<button onclick="moveAnomaly()">Move ANOMALY-001</button>

<h2>Events</h2>
<button onclick="eventMsg('⚠ CONTAINMENT BREACH')">Containment Breach</button>
<button onclick="eventMsg('☢ REACTOR MELTDOWN')">Reactor Meltdown</button>

</div>

<script>
let x=50, y=50;
const map = document.getElementById("map");

/* click map */
map.addEventListener("click", e=>{
  let rect = map.getBoundingClientRect();
  x = ((e.clientX - rect.left) / rect.width) * 100;
  y = ((e.clientY - rect.top) / rect.height) * 100;

  document.getElementById("x").innerText = x.toFixed(1);
  document.getElementById("y").innerText = y.toFixed(1);

  map.innerHTML = `<div class="marker" style="left:${x}%;top:${y}%"></div>`;
});

/* deploy alpha */
function deploy(){
  let count = parseInt(document.getElementById("count").value) || 5;

  let anomalies = JSON.parse(localStorage.getItem("anomalies")) || [];

  let existing = anomalies.find(a=>a.type==="blue");

  if(existing){
    existing.x = x;
    existing.y = y;
    existing.count = count;
  } else {
    anomalies.push({name:"ALPHA-91", x, y, type:"blue", count});
  }

  localStorage.setItem("anomalies", JSON.stringify(anomalies));
}

/* move anomaly */
function moveAnomaly(){
  let anomalies = JSON.parse(localStorage.getItem("anomalies")) || [];

  let a = anomalies.find(a=>a.type==="red");
  if(a){
    a.x = x;
    a.y = y;
  }

  localStorage.setItem("anomalies", JSON.stringify(anomalies));
}

/* events */
function eventMsg(msg){
  localStorage.setItem("message", msg);
}
</script>

</body>
</html>
